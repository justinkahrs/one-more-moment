name: Submit IndexNow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: indexnow-main
  cancel-in-progress: true

jobs:
  submit:
    name: Submit sitemap URLs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build sitemap
        run: npm run build

      - name: Wait for production deploy
        run: sleep "${INDEXNOW_DEPLOY_WAIT_SECONDS:-120}"

      - name: Submit URLs to IndexNow
        run: npm run indexnow
